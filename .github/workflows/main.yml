name: Traffic Engine
on:
  workflow_dispatch:
  schedule:
    - cron: '*/45 * * * *' # Proti 45 min por por auto cholbe

jobs:
  hit-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Setup
        run: npm install
      - name: Launch Engine
        run: node traffic.js
